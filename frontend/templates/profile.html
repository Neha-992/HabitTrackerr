<!DOCTYPE html>
<html>
<head>

    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fa;
        }

        .profile-card{
            border:none;
            border-radius:20px;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card profile-card shadow p-5 text-center">

                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                     width="120"
                     class="mx-auto mb-4">

                <h2 class="fw-bold">
                    {{ request.user.username }}
                </h2>

                <p class="text-muted">
                    {{ request.user.email }}
                </p>

                <hr>

                <div class="row mt-4">

                    <div class="col-6">

                        <h5>Total XP</h5>

                        <h3>{{ profile.xp }}</h3>

                    </div>

                    <div class="col-6">

                        <h5>Level</h5>

                        <h3>{{ profile.level }}</h3>

                    </div>

                </div>

                <div class="row mt-4">

                    <div class="col-6">

                        <h5>Total Habits</h5>

                        <h3>{{ total_habits }}</h3>

                    </div>

                    <div class="col-6">

                        <h5>Completions</h5>

                        <h3>{{ total_completed }}</h3>

                    </div>

                </div>

                <div class="mt-5">

                    <a href="{% url 'dashboard' %}"
                       class="btn btn-primary">
                        Back to Dashboard
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
